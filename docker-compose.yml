services:
  review-analysis-api:
    build:
      context: .
    container_name: app-store-review-analysis-api
    env_file:
      - .env
    environment:
      OPENAI_INSIGHTS_MODEL: ${OPENAI_INSIGHTS_MODEL:-gpt-4.1-mini}
      OPENAI_INSIGHTS_MIN_KEYWORD_COUNT: ${OPENAI_INSIGHTS_MIN_KEYWORD_COUNT:-4}
      OPENAI_INSIGHTS_MAX_COMMENTS_PER_KEYWORD: ${OPENAI_INSIGHTS_MAX_COMMENTS_PER_KEYWORD:-8}
      OPENAI_INSIGHTS_FALLBACK_KEYWORD_GROUPS: ${OPENAI_INSIGHTS_FALLBACK_KEYWORD_GROUPS:-3}
      SENTIMENT_ANALYZER_BACKEND: ${SENTIMENT_ANALYZER_BACKEND:-openai}
      OPENAI_SENTIMENT_MODEL: ${OPENAI_SENTIMENT_MODEL:-gpt-4.1-mini}
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
